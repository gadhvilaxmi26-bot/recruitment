{% extends 'jobportal/base.html' %}
{% block content %}

<section class="min-h-screen flex items-center justify-center bg-[#020617] px-6 relative overflow-hidden">

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-amber-600/10 rounded-full blur-[120px] -z-0"></div>

    <div class="w-full max-w-3xl relative z-10">

        <div class="bg-white/5 backdrop-blur-2xl border border-white/10 p-12 rounded-[4rem] shadow-2xl">

            <div class="mb-12">

                <h2 class="text-6xl font-black uppercase leading-none text-white">
                    Create Your
                    <span class="block text-amber-500">
                        Account
                    </span>
                </h2>

            </div>

            <form method="POST">

                {% csrf_token %}

                <div class="grid md:grid-cols-2 gap-8">

                    <div>
                        <label class="text-white text-xl block mb-3">
                            Username
                        </label>

                        <input
                            type="text"
                            name="username"
                            required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white"
                        >
                    </div>

                    <div>
                        <label class="text-white text-xl block mb-3">
                            Email
                        </label>

                        <input
                            type="email"
                            name="email"
                            required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white"
                        >
                    </div>

                    <div>
                        <label class="text-white text-xl block mb-3">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password1"
                            required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white"
                        >
                    </div>

                    <div>
                        <label class="text-white text-xl block mb-3">
                            Confirm Password
                        </label>

                        <input
                            type="password"
                            name="password2"
                            required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white"
                        >
                    </div>

                </div>

                <button
                    type="submit"
                    class="w-full mt-10 bg-amber-500 hover:bg-amber-400 text-black py-5 rounded-2xl text-xl font-black transition"
                >
                    Register Account
                </button>

            </form>

        </div>

    </div>

</section>

{% endblock %}
