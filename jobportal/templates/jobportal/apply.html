{% extends 'jobportal/base.html' %}
{% block content %}

<section class="min-h-screen pt-32 pb-20 px-6 bg-[#020617] relative overflow-hidden">

```
<!-- Background Glow -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-amber-600/10 rounded-full blur-[120px] -z-0"></div>

<div class="max-w-3xl mx-auto relative z-10">

    <!-- Success / Error Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="mb-8 px-6 py-4 rounded-2xl text-center font-black uppercase tracking-widest text-xs
                {% if message.tags == 'success' %}
                    bg-amber-500/10 border border-amber-500/20 text-amber-400
                {% else %}
                    bg-red-500/10 border border-red-500/20 text-red-400
                {% endif %}
            ">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <!-- Main Card -->
    <div class="bg-white/5 backdrop-blur-2xl border border-white/10 p-10 md:p-14 rounded-[3rem] shadow-2xl">

        <!-- Heading -->
        <div class="mb-12">

            <h2 class="text-amber-500 font-black text-[10px] uppercase tracking-[0.4em] mb-4">
                Application Portal
            </h2>

            <h1 class="text-4xl font-black text-white tracking-tighter uppercase leading-none">
                Apply for <br>
                <span class="text-amber-500">
                    {{ job.title }}
                </span>
            </h1>

            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-4 italic">
                Confirm your professional credentials below
            </p>

        </div>

        <!-- Form -->
        <form method="POST" enctype="multipart/form-data" class="space-y-8">

            {% csrf_token %}

            <!-- Name + Email -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                <div class="space-y-2">

                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">
                        Full Name
                    </label>

                    <input
                        type="text"
                        name="full_name"
                        value="{{ user.username }}"
                        required
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-amber-500/50 transition-all font-medium"
                    >

                </div>

                <div class="space-y-2">

                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">
                        Email Address
                    </label>

                    <input
                        type="email"
                        name="email"
                        value="{{ user.email }}"
                        required
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-amber-500/50 transition-all font-medium"
                    >

                </div>

            </div>

            <!-- Phone + Qualification -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                <div class="space-y-2">

                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">
                        Phone Number
                    </label>

                    <input
                        type="text"
                        name="phone"
                        placeholder="+91 XXXXX XXXXX"
                        required
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-amber-500/50 transition-all font-medium"
                    >

                </div>
                                            
                                    <!-- DOB + Relocate -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">
                                Date of Birth
                            </label>
                            <input
                                type="date"
                                name="dob"
                                required
                                class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-amber-500/50 transition-all font-medium"
                            >
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">
                                Willing to Relocate to Mundra, Gujarat?
                            </label>
                            <select
                                name="willing_to_relocate"
                                required
                                class="w-full bg-[#020617] border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-amber-500/50 transition-all font-medium"
                            >
                                <option value="">Select</option>
                                <option value="yes">Yes</option>
                                <option value="no">No</option>
                            </select>
                        </div>

                    </div>
                                    <div class="space-y-2">

                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">
                        Highest Qualification
                    </label>

                    <input
                        type="text"
                        name="qualification"
                        placeholder="B.Tech / MBA / Diploma"
                        required
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-amber-500/50 transition-all font-medium"
                    >

                </div>

            </div>

            <!-- Resume -->
            <div class="space-y-2">

                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">
                    Upload Resume (PDF ONLY)
                </label>

                <input
                    type="file"
                    name="resume"
                    accept=".pdf"
                    required
                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-slate-400
                    file:bg-amber-500
                    file:text-black
                    file:border-0
                    file:px-4
                    file:py-2
                    file:rounded-xl
                    file:text-[10px]
                    file:font-black
                    file:uppercase
                    file:mr-4
                    hover:file:bg-white
                    cursor-pointer"
                >

            </div>

            <!-- Submit -->
            <button
                type="submit"
                class="w-full bg-amber-500 text-black py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-xl shadow-amber-900/40 hover:bg-white transition-all transform hover:-translate-y-1"
            >
                Submit Professional Application
            </button>

        </form>

    </div>

</div>
```

</section>

{% endblock %}
