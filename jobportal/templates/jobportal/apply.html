{% extends 'jobportal/base.html' %}
{% block content %}

<section class="min-h-screen pt-36 pb-20 px-6 bg-[#020617] relative overflow-hidden">

    <!-- Background Glow -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[900px] h-[450px] bg-amber-500/10 rounded-full blur-[140px]"></div>

    <div class="max-w-5xl mx-auto relative z-10">

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="mb-8 px-6 py-4 rounded-2xl text-center font-bold tracking-wider
                    {% if message.tags == 'success' %}
                        bg-green-500/10 border border-green-500/20 text-green-400
                    {% else %}
                        bg-red-500/10 border border-red-500/20 text-red-400
                    {% endif %}
                ">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Card -->
        <div class="bg-white/5 backdrop-blur-2xl border border-white/10 rounded-[35px] shadow-2xl p-8 md:p-14">

            <!-- Heading -->
            <div class="mb-12">

                <p class="text-amber-500 uppercase tracking-[0.35em] text-xs font-bold mb-3">
                    Application Portal
                </p>

                <h1 class="text-3xl md:text-5xl font-black text-white leading-tight uppercase">
                    Apply For
                    <span class="block text-amber-500">
                        {{ job.title }}
                    </span>
                </h1>

                <p class="text-slate-400 mt-4 uppercase tracking-widest text-xs">
                    Confirm your professional credentials below
                </p>

            </div>

            <form method="POST" enctype="multipart/form-data" class="space-y-8">

                {% csrf_token %}

                <!-- Row 1 -->
                <div class="grid md:grid-cols-2 gap-8">

                    <div>
                        <label class="block mb-2 text-xs uppercase tracking-widest text-slate-400">
                            Full Name
                        </label>

                        <input
                            type="text"
                            name="full_name"
                            value="{{ user.username }}"
                            required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder:text-slate-500 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 transition"
                        >
                    </div>

                    <div>
                        <label class="block mb-2 text-xs uppercase tracking-widest text-slate-400">
                            Email Address
                        </label>

                        <input
                            type="email"
                            name="email"
                            value="{{ user.email }}"
                            required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder:text-slate-500 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 transition"
                        >
                    </div>

                </div>

                <!-- Row 2 -->

                <div class="grid md:grid-cols-2 gap-8">

                    <div>

                        <label class="block mb-2 text-xs uppercase tracking-widest text-slate-400">
                            Phone Number
                        </label>

                        <input
                            type="text"
                            name="phone"
                            placeholder="+91 XXXXX XXXXX"
                            required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder:text-slate-500 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 transition"
                        >

                    </div>

                    <div>

                        <label class="block mb-2 text-xs uppercase tracking-widest text-slate-400">
                            Date of Birth
                        </label>

                        <input
                            type="date"
                            name="dob"
                            required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 transition"
                        >

                    </div>

                </div>

                <!-- Row 3 -->

                <div class="grid md:grid-cols-2 gap-8">

                    <div>

                        <label class="block mb-2 text-xs uppercase tracking-widest text-slate-400">
                            Highest Qualification
                        </label>

                        <input
                            type="text"
                            name="qualification"
                            placeholder="B.Tech / MBA / Diploma"
                            required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder:text-slate-500 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 transition"
                        >

                    </div>

                    <div>

                        <label class="block mb-2 text-xs uppercase tracking-widest text-slate-400">
                            Willing to Relocate to Mundra?
                        </label>

                        <select
                            name="willing_to_relocate"
                            required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 transition"
                        >
                            <option class="bg-slate-900" value="">
                                Select
                            </option>

                            <option class="bg-slate-900" value="yes">
                                Yes
                            </option>

                            <option class="bg-slate-900" value="no">
                                No
                            </option>

                        </select>

                    </div>

                </div>

                <!-- Resume -->

                <div>

                    <label class="block mb-2 text-xs uppercase tracking-widest text-slate-400">
                        Upload Resume (PDF Only)
                    </label>

                    <input
                        type="file"
                        name="resume"
                        accept=".pdf"
                        required
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-slate-400
                        file:bg-amber-500
                        file:text-black
                        file:border-0
                        file:px-5
                        file:py-2
                        file:rounded-xl
                        file:font-bold
                        file:mr-5
                        file:hover:bg-white
                        file:transition
                        cursor-pointer"
                    >

                </div>

                <!-- Submit -->

                <button
                    type="submit"
                    class="w-full bg-amber-500 hover:bg-white text-black font-black uppercase tracking-[0.2em] py-5 rounded-2xl transition duration-300 hover:-translate-y-1 shadow-xl shadow-amber-900/40"
                >
                    Submit Application
                </button>

            </form>

        </div>

    </div>

</section>

{% endblock %}
