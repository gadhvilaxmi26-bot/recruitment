{% extends 'jobportal/base.html' %}
{% block content %}

<section class="min-h-screen flex items-center justify-center bg-[#020617] px-6 relative overflow-hidden">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-amber-600/10 rounded-full blur-[120px] -z-0"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="bg-white/5 backdrop-blur-2xl border border-white/10 p-10 rounded-[3rem] shadow-2xl">
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-amber-500 rounded-2xl flex items-center justify-center text-black font-black text-2xl italic mx-auto mb-6 shadow-lg shadow-amber-500/20">C</div>
                <h2 class="text-3xl font-black text-white tracking-tighter uppercase">Welcome <span class="text-amber-500">Back</span></h2>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-2">Access your professional portal</p>
            </div>

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 ml-2">Username / Email</label>
                    <input type="text" name="username" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-amber-500/50 transition-all font-medium placeholder:text-white/10" placeholder="Enter your username">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 ml-2">Password</label>
                    <input type="password" name="password" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-amber-500/50 transition-all font-medium placeholder:text-white/10" placeholder="••••••••">
                </div>

                <button type="submit" class="w-full bg-amber-500 hover:bg-white text-black py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-xl shadow-amber-900/20 transition-all transform hover:-translate-y-1">
                    Sign In to Calorine
                </button>
            </form>

            <div class="mt-10 text-center space-y-4">
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">
                    Don't have an account? 
                    <a href="{% url 'register' %}" class="text-amber-500 hover:text-white transition-colors">Create one now</a>
                </p>
                <a href="#" class="block text-slate-600 text-[9px] font-black uppercase tracking-widest hover:text-slate-400 transition-colors">Forgot Password?</a>
            </div>
        </div>
    </div>
</section>

{% endblock %}
