<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calorine Enterprise | Professional Recruitment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
    </style>
</head>
<body class="text-slate-100">

<nav class="fixed top-4 left-1/2 -translate-x-1/2 w-[90%] z-[100] bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="{% url 'home' %}" class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic">C</div>
            <span class="text-white font-black tracking-tighter uppercase">Calorine <span class="text-blue-500 text-[10px] block tracking-[0.3em]">Enterprise</span></span>
        </a>

        <div class="hidden md:flex gap-8 text-[10px] font-black uppercase tracking-widest text-white/70">
            <a href="{% url 'home' %}" class="hover:text-white">Home</a>
            <a href="{% url 'jobs' %}" class="hover:text-white">Find Jobs</a>
            <a href="{% url 'hire_talent' %}" class="hover:text-white">Hire Talent</a>
        </div>

        <div class="flex items-center gap-4">
            <a href="{% url 'login' %}" class="text-[10px] font-black uppercase text-white/70 hover:text-white">Login</a>
            <a href="{% url 'register' %}" class="bg-blue-600 px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg hover:bg-blue-700 transition-all">Join Now</a>
        </div>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="bg-slate-950 py-10 border-t border-white/5 text-center">
    <p class="text-slate-600 text-[10px] font-black uppercase tracking-[0.4em]">© 2026 CALORINE ENTERPRISE</p>
</footer>

</body>
</html>
